name: Markdown Links

# Docs-only PRs skip test.yml (paths-ignore); this keeps markdown-link-check
# running for those PRs. Code/mixed PRs still get the job via ci.yml.

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"

permissions:
  contents: read

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-markdown-links
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --root-dir . --verbose --no-progress './**/*.md'
