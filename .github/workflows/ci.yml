name: CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run backend lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run backend type check
        run: uv run mypy .

      - name: Run unit tests
        env:
          QDRANT_URL: http://localhost:6333
          QDRANT_COLLECTION_NAME: JOBS_ON_THE_HUB
          EMBEDDING_MODEL: intfloat/multilingual-e5-small
          HUBSTER_API_KEYS: test-api-key
        run: uv run pytest -v -m "not retrieval and not generation"

  retrieval-test:
    # ADR-0014: E5 has no local FastEmbed path — eval tests hit Qdrant Cloud and
    # drop/re-seed JOBS_DEV on every run (Cloud Inference token usage). Avoid
    # manual --seed-dev against the same cluster while CI is running.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-retrieval
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run retrieval and generation eval tests
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_COLLECTION_NAME: ${{ secrets.QDRANT_COLLECTION_NAME }}
          QDRANT_DEV_COLLECTION_NAME: JOBS_DEV
          EMBEDDING_MODEL: intfloat/multilingual-e5-small
          HUBSTER_API_KEYS: test-api-key
        run: uv run pytest -v -m "retrieval or generation"

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-frontend
      cancel-in-progress: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run frontend lint
        run: npm run lint

  markdown-link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-markdown-links
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --root-dir . --verbose --no-progress './**/*.md'
