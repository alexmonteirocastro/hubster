name: CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run backend lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run backend type check
        run: uv run mypy .

      - name: Run unit tests
        env:
          QDRANT_URL: http://localhost:6333
          QDRANT_COLLECTION_NAME: JOBS_ON_THE_HUB
          EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
        run: uv run pytest -v -m "not retrieval and not generation"

  retrieval-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-retrieval
      cancel-in-progress: true
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.12"

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: fastembed-${{ runner.os }}-bge-small-en-v1.5

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Wait for Qdrant
        run: |
          for attempt in $(seq 1 30); do
            if curl -sf http://localhost:6333/collections >/dev/null; then
              echo "Qdrant is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Qdrant did not become ready in time"
          exit 1

      - name: Run retrieval and generation eval tests
        env:
          QDRANT_URL: http://localhost:6333
          QDRANT_COLLECTION_NAME: JOBS_ON_THE_HUB
          QDRANT_DEV_COLLECTION_NAME: JOBS_DEV
          EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
        run: uv run pytest -v -m "retrieval or generation"

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-frontend
      cancel-in-progress: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run frontend lint
        run: npm run lint

  markdown-link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-markdown-links
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --root-dir . --verbose --no-progress './**/*.md'
