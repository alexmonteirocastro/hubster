# Local dev overrides — auto-loaded by `docker compose up`.
# Bind-mounts source so .py edits apply without rebuilding the image.
# The anonymous /app/.venv volume keeps the image's virtualenv intact.
services:
  api:
    volumes:
      - .:/app
      - /app/.venv
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  ingestion:
    volumes:
      - .:/app
      - /app/.venv

  test:
    volumes:
      - ./tests:/app/tests
      - ./the_hub_client:/app/the_hub_client
      - ./api:/app/api
      - ./db:/app/db
      - ./llm_client:/app/llm_client

  test-retrieval:
    volumes:
      - ./tests:/app/tests
      - ./the_hub_client:/app/the_hub_client
      - ./api:/app/api
      - ./db:/app/db
      - ./llm_client:/app/llm_client
