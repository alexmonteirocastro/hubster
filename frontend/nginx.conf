# Production nginx config (Docker image default / non-dev Compose).
# Proxy-layer limit_conn/limit_req on /api/chat are defense-in-depth against
# connection exhaustion and coarse abuse — complementary to ADR-0006's app-level
# per-IP request-rate limiter (slowapi), which tracks request counts inside
# FastAPI. Different failure modes: held worker connections vs. request-count abuse.
# limit_req (15r/m) is looser than the default CHAT_RATE_LIMIT (10/minute) so
# request-count throttling still returns the app's JSON 429 first.
limit_conn_zone $binary_remote_addr zone=chat_conn:10m;
limit_req_zone $binary_remote_addr zone=chat_req:10m rate=15r/m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location = /api/chat {
        limit_conn chat_conn 5;
        limit_conn_status 429;
        limit_req zone=chat_req burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://api:8000/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Sized to Gemini's full retry envelope (GEMINI_MAX_RETRIES=3 + backoff),
        # not single-request GEMINI_TIMEOUT. Ollama is dev-only (ADR-0013).
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    location ~ ^/(favicon\.ico|favicon-\d+x\d+\.png|favicon\.svg|apple-touch-icon\.png)$ {
        try_files $uri =404;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
