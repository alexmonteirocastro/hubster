# Local commit-time checks. CI remains the enforcement gate for skipped hooks.
# Setup: uv sync --group dev && uv run pre-commit install
# mypy is intentionally CI-only (too slow for commit-time).

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        name: ruff check (backend)
        files: ^(api|db|llm_client|the_hub_client|tests)/|^main\.py$
      - id: ruff-format
        name: ruff format (backend)
        files: ^(api|db|llm_client|the_hub_client|tests)/|^main\.py$

  - repo: local
    hooks:
      - id: oxlint
        name: oxlint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/
        pass_filenames: false
