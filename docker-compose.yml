services:
  # Legacy local Qdrant — not used for embedding under intfloat/multilingual-e5-small
  # (Cloud Inference required). Kept for stack health wiring; see ADR-0014.
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  ingestion:
    build:
      context: .
      target: runtime
    profiles:
      - ingestion
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
    command: ["python", "main.py"]

  test:
    build:
      context: .
      target: test
    image: hubster-test
    profiles:
      - test
    command: ["pytest", "-v", "-m", "not retrieval and not generation"]
  test-retrieval:
    build:
      context: .
      target: test
    image: hubster-test
    profiles:
      - test
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
    command: ["pytest", "-v", "-m", "retrieval or generation"]
volumes:
  qdrant_data:
