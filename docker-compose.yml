services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  ingestion:
    build:
      context: .
      target: runtime
    profiles:
      - ingestion
    env_file:
      - .env
    command: ["python", "main.py"]

  test:
    build:
      context: .
      target: test
    image: hubster-test
    profiles:
      - test
    # Mirror CI unit-test env (.env is dockerignored; unit tests need no live Qdrant).
    environment:
      QDRANT_URL: http://localhost:6333
      QDRANT_COLLECTION_NAME: JOBS_ON_THE_HUB
      EMBEDDING_MODEL: intfloat/multilingual-e5-small
      HUBSTER_API_KEYS: test-api-key
    command: ["pytest", "-v", "-m", "not retrieval and not generation"]
